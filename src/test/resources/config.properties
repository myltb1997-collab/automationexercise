# ================================
# Application Configuration
# ================================

# Browser Configuration
# Supported: chrome, firefox, edge
browser=chrome

# Base URL Configuration
base.url=https://automationexercise.com

# Environment Configuration
# Values: dev, staging, prod
environment=staging

# Timeout Configuration (in seconds)
timeout.default=15
timeout.page.load=60

# Page Load Strategy
# Values: normal, eager, none
page.load.strategy=eager

# Browser Window Size
window.width=1920
window.height=1080

# Ad Blocking Configuration
# Set to true to block ads during tests
ads.blocking.enabled=true

# Notification and Popup Blocking
browser.notifications.disabled=true
browser.infobars.disabled=true
browser.password.popup.disabled=true

# Logging
log.level=INFO

