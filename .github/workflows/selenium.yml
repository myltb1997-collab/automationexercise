name: Selenium Tests with Allure

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Cache WebDriverManager cache (~/.cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
          key: ${{ runner.os }}-wdm-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-wdm-

      - name: Install browser dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip libnss3 libatk1.0-0 libatk-bridge2.0-0 libx11-xcb1 libxcb1 libxcomposite1 libxrandr2 libgtk-3-0 libgbm1 libasound2 fonts-liberation xvfb

      - name: Show environment info
        run: |
          java -version || true
          mvn -version || true
          node -v || true
          npm -v || true

      - name: Start X virtual framebuffer
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run full regression tests (Maven)
        run: |
          echo "Running full test suite..."
          mvn -B test

      - name: Generate Allure report
        run: |
          echo "Generating Allure report..."
          mvn -Dallure.results.directory=allure-results -Dallure.report.directory=allure-report io.qameta.allure:allure-maven:2.12.0:report

      - name: List generated artifacts (for debug)
        run: |
          echo "== allure-results =="
          ls -la allure-results || true
          echo "== allure-report =="
          ls -la allure-report || true
          echo "== screenshots =="
          ls -la target/screenshots || true

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload allure-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots
          if-no-files-found: ignore

      - name: Upload maven logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-logs
          path: |
            target/surefire-reports
            target/failsafe-reports
          if-no-files-found: ignore

